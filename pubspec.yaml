name: fourteen_november
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  pocketbase: ^0.23.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  hive_generator: ^2.0.1
  build_runner: ^2.5.4
  go_router: ^17.0.0
  lucide_icons: ^0.257.0
  google_fonts: ^6.3.2
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  flutter_launcher_icons: ^0.14.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/outfit/Outfit-Light.ttf
          weight: 300
        - asset: assets/fonts/outfit/Outfit-Regular.ttf
        - asset: assets/fonts/outfit/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/outfit/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/outfit/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/outfit/Outfit-Black.ttf
          weight: 900

    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/vazirmatn/Vazirmatn-Light.ttf
          weight: 300
        - asset: assets/fonts/vazirmatn/Vazirmatn-Regular.ttf
        - asset: assets/fonts/vazirmatn/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/vazirmatn/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/vazirmatn/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/vazirmatn/Vazirmatn-Black.ttf
          weight: 900

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"